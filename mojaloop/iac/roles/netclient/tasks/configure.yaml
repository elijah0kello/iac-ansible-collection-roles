- name: Get netclient list output
  shell: "netclient list"
  register: _result
##get networks from netclient command line netclient list, loop over networks with nodeid
- name: Add egress gw using curl
  shell: |
    curl -s -o /dev/null -w "%{http_code}" \
      -X POST "https://{{ netmaker_api_host }}/api/nodes/{{ item.network }}/{{ item.node_id }}/creategateway" \
      -H "Content-Type: application/json" \
      -H "Authorization: Bearer {{ netmaker_master_key }}" \
      -d '{{ lookup("template", "creategw.json.j2") | to_json }}'
  register: curl_result
  loop: "{{ _result.stdout }}"
  changed_when: curl_result.stdout != "200"
  failed_when: curl_result.stdout not in ["200", "400"]
