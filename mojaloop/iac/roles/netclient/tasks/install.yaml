- name: Install netclient gpgkey
  command: >
    wget
    -O /etc/apt/trusted.gpg.d/netclient.asc
    https://apt.netmaker.org/gpg.key
  args:
    creates: /etc/apt/trusted.gpg.d/netclient.asc

- name: Install netclient package repo
  command: >
    wget
    -O /etc/apt/sources.list.d/netclient.list
    https://apt.netmaker.org/debian.deb.txt
  args:
    creates: /etc/apt/sources.list.d/netclient.list

- name: Update apt cache
  shell: apt update

- name: Install dependencies
  package:
    name:
      - wireguard
      - netclient={{ netmaker_image_version }}-0
    state: present

- name: Read enrollment key list file content from {{ netmaker_enrollment_key_list_file_location }}
  ansible.builtin.slurp:  # Use slurp to read the whole file
    src: "{{ netmaker_enrollment_key_list_file_location }}"
  register: enrollment_key_file_content

- name: set token from local file 
  vars:
    query: "[?tags[0]=='{{ item }}'].token"
  set_fact:
    netmaker_join_tokens: "{{ netmaker_join_tokens | default([]) + [ (enrollment_key_file_content.content | b64decode | from_json | json_query(query) | first) ] }}"
  when: enrollment_key_file_content.content is defined and enrollment_key_file_content.content | b64decode | from_json is defined and (enrollment_key_file_content.content | b64decode | from_json | json_query(query) | first) is defined
  loop: "{{ netclient_enrollment_keys }}"
  # ignore_errors: true

- name: join netmaker network
  command: "netclient join -t {{ item }}"
  loop: "{{ netmaker_join_tokens | default([]) }}"

- name: Ensure Netmaker client configuration directory exists
  file:
    path: /etc/netclient
    state: directory
    mode: '0755'

- name: Update Netmaker client configuration with inbound IP
  lineinfile:
    path: /etc/netclient/netclient.yml
    regexp: '^endpointip:'
    line: "endpointip: {{ ansible_host }}"
    create: yes
    state: present

- name: iptable accept on forward
  iptables:
    chain: FORWARD
    policy: ACCEPT

- name: "set netclient to auto restart"
  systemd:
    enabled: true
    daemon_reload: true
    name: "netclient"
    state: started
    force: true