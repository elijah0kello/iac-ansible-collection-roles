- name: Install netclient gpgkey
  command: >
    wget
    -O /etc/apt/trusted.gpg.d/netclient.asc
    https://apt.netmaker.org/gpg.key
  args:
    creates: /etc/apt/trusted.gpg.d/netclient.asc

- name: Install netclient package repo
  command: >
    wget
    -O /etc/apt/sources.list.d/netclient.list
    https://apt.netmaker.org/debian.deb.txt
  args:
    creates: /etc/apt/sources.list.d/netclient.list

- name: Update apt cache
  shell: apt update

- name: Install dependencies
  package:
    name:
      - wireguard
      - netclient={{ netmaker_image_version }}-0
    state: present

- name: Check if enrollment key list file exists and is non-empty
  ansible.builtin.stat:
    path: "{{ netmaker_enrollment_key_list_file_location }}"
  register: enrollment_key_file_stat

- name: Fail if enrollment key list file is empty
  ansible.builtin.fail:
    msg: "Enrollment key list file exists but is empty ([]), cannot continue."
  when: enrollment_key_file_stat.stat.exists and enrollment_key_file_stat.stat.size <= 2

- name: Load JSON content from file
  ansible.builtin.set_fact:
    enrollment_key_list: "{{ lookup('file', netmaker_enrollment_key_list_file_location) | from_json }}"
  when: enrollment_key_file_stat.stat.exists and enrollment_key_file_stat.stat.size > 2


- name: set token from local file
  vars:
    query: "[?tags[0]=='{{ item }}'].token"
  set_fact:
    netmaker_join_tokens: "{{ netmaker_join_tokens | default([]) + [ (enrollment_key_file_content.content | from_json | json_query(query) | first) ] }}"
  when:
    - enrollment_key_file_content.content is defined
    - (enrollment_key_file_content.content | from_json is defined)
    - (enrollment_key_file_content.content | from_json | json_query(query) | first) is defined
  loop: "{{ netclient_enrollment_keys }}"
  # ignore_errors: true


- name: join netmaker network
  command: "netclient join -t {{ item }}"
  loop: "{{ netmaker_join_tokens | default([]) }}"

- name: Ensure Netmaker client configuration directory exists
  file:
    path: /etc/netclient
    state: directory
    mode: '0755'

- name: Update Netmaker client configuration with inbound IP
  lineinfile:
    path: /etc/netclient/netclient.yml
    regexp: '^endpointip:'
    line: "endpointip: {{ ansible_host }}"
    create: yes
    state: present

- name: iptable accept on forward
  iptables:
    chain: FORWARD
    policy: ACCEPT

- name: "set netclient to auto restart"
  systemd:
    enabled: true
    daemon_reload: true
    name: "netclient"
    state: started
    force: true