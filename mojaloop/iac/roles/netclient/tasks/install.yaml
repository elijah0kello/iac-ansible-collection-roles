- name: Install netclient gpgkey using wget
  ansible.builtin.command: >
    wget -qO /etc/apt/trusted.gpg.d/netclient.asc https://apt.netmaker.org/gpg.key

- name: Set permissions on netclient gpgkey
  ansible.builtin.file:
    path: /etc/apt/trusted.gpg.d/netclient.asc
    mode: '0777'

- name: Install netclient package repo using wget
  ansible.builtin.command: >
    wget -qO /etc/apt/sources.list.d/netclient.list https://apt.netmaker.org/debian.deb.txt

- name: Set permissions on netclient package repo list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/netclient.list
    mode: '0777'


- name: Update apt cache
  shell: apt update

- name: Install dependencies
  package:
    name:
      - wireguard
      - netclient={{ netmaker_image_version }}-0
    state: present

- name: set token from local file
  vars:
    query: "[?tags[0]=='{{ item }}'].token"
  set_fact:
    netmaker_join_tokens: "{{ netmaker_join_tokens + [lookup('file', netmaker_enrollment_key_list_file_location) | from_json | json_query(query) | first] }}"
  when: "not netmaker_join_tokens"
  loop: "{{ netclient_enrollment_keys }}"

- name: join netmaker network
  command: "netclient join -t {{ item }}"
  loop: "{{ netmaker_join_tokens }}"
- name: Ensure SSH is allowed after joining Netmaker (iptables)
  become: true
  command: "iptables -I INPUT -p tcp --dport 22 -j ACCEPT"
  when: ansible_os_family == "Debian" or ansible_os_family == "Ubuntu"
- name: Ensure SSH is allowed after joining Netmaker (nftables)
  become: true
  command: "nft insert rule inet filter INPUT tcp dport 22 accept"
  when: ansible_os_family == "RedHat" or ansible_os_family == "CentOS"

- name: Ensure Netmaker client configuration directory exists
  file:
    path: /etc/netclient
    state: directory
    mode: '0755'

- name: Update Netmaker client configuration with inbound IP
  lineinfile:
    path: /etc/netclient/netclient.yml
    regexp: '^endpointip:'
    line: "endpointip: {{ ansible_host }}"
    create: yes
    state: present

- name: iptable accept on forward
  iptables:
    chain: FORWARD
    policy: ACCEPT

- name: "set netclient to auto restart"
  systemd:
    enabled: true
    daemon_reload: true
    name: "netclient"
    state: started
    force: true
  
# command to set ip link interface down
- name: "Drop ip link inteface for netmaker down"
  command: "ip link set netmaker down"
  when: ansible_os_family == "Debian" or ansible_os_family == "Ubuntu"
- name: "Drop ip link inteface for netmaker down"
  command: "ip link set netmaker down"
  when: ansible_os_family == "RedHat" or ansible_os_family == "CentOS"