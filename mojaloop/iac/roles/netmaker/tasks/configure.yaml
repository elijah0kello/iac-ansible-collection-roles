- name: Wait for Netmaker API server to respond
  ansible.builtin.command: >
    curl -s -o /dev/null -w "%{http_code}"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    https://api.{{ netmaker_base_domain }}/api/networks
  register: curl_response
  until: curl_response.stdout == "200"
  retries: 5
  delay: 5
  changed_when: false

- name: Add admin user via curl
  ansible.builtin.command: >
    curl -s -w "%{http_code}" -o /tmp/add_admin_response.txt
    -X POST
    -H "Content-Type: application/json"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    -d '{{ lookup("template", "createadminuser.json.j2") | to_json }}'
    https://api.{{ netmaker_base_domain }}/api/users/{{ netmaker_admin_username }}
  register: curl_response
  changed_when: false
  failed_when: curl_response.stdout not in ["200", "400", "500"]


- name: Get all existing networks via curl
  ansible.builtin.command: >
    curl -s -w "%{http_code}" -H "Content-Type: application/json"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    https://api.{{ netmaker_base_domain }}/api/networks
  register: curl_response_raw
  changed_when: false
  failed_when: curl_response_raw.stdout[-3:] != "200"

- name: Extract network list from curl response
  set_fact:
    existing_netmaker_networks: "{{ existing_netmaker_networks_data }}"
  vars:
    existing_netmaker_networks_data: >-
      {{ curl_response_raw.stdout[:-3] | from_json }} 

- name: Debug parsed existing networks
  debug:
    var: existing_netmaker_networks

- name: Compose the new network list
  set_fact:
    new_netmaker_networks: "{{ (new_netmaker_networks | default([])) + [ { 'network_name': item.network_name, 'node_keys': item.node_keys, 'network_cidr': item.network_cidr } ] }}"
  when: existing_netmaker_networks | selectattr('netid', 'defined') | selectattr('netid', 'equalto', item.network_name) | list | count == 0
  loop: "{{ netmaker_networks }}"
  loop_control:
    loop_var: item

- name: Create new networks in Netmaker via curl
  ansible.builtin.command: >
    curl -s -w "%{http_code}" -o /tmp/create_network_response.txt
    -X POST
    -H "Content-Type: application/json"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    -d '{{ lookup("template", "createnetwork.json.j2") | to_json }}'
    https://api.{{ netmaker_base_domain }}/api/networks
  register: create_network_result
  loop: "{{ new_netmaker_networks }}"
  loop_control:
    loop_var: item
  changed_when: false
  failed_when: create_network_result.stdout[-3:] != "200"

- name: Get keys via curl and store the response in a fact
  ansible.builtin.command: >
    curl -s -w "%{http_code}" -o /tmp/key_response.json
    -H "Content-Type: application/json"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys
  register: curl_response
  changed_when: false
  failed_when: curl_response.stdout[-3:] != "200"

- name: Debug full curl response for keys
  debug:
    msg: "{{ curl_response.stdout }}"

- name: Set the response body as a fact (strip status code and newline)
  set_fact:
    key_response: "{{ (curl_response.stdout[:-3] | from_json) if (curl_response.stdout[:-3] | length) > 0 else [] }}"
  when: curl_response.stdout[-3:] == "200"

- name: Debug key_response
  debug:
    var: key_response

- name: Add key for control network for netclient via curl
  ansible.builtin.command: >
    curl -s -w "%{http_code}"
    -X POST
    -H "Content-Type: application/json"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    -d '{{ lookup("template", "createkey.json.j2") | to_json }}'
    https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys
  register: create_key_response
  when: key_response | length == 0
  loop: "{{ new_netmaker_networks | subelements('node_keys') }}"
  loop_control:
    loop_var: item
  changed_when: false
  failed_when: create_key_response.stdout[-3:] != "200"

- name: Get keys again via curl
  ansible.builtin.command: >
    curl -s -w "%{http_code}"
    -H "Content-Type: application/json"
    -H "Authorization: Bearer {{ netmaker_master_key }}"
    https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys
  register: curl_response2
  changed_when: false
  failed_when: curl_response2.stdout[-3:] != "200"

- name: Debug full curl response for second key retrieval
  debug:
    msg: "{{ curl_response2.stdout }}"

- name: Set the response body as a fact (strip status code and newline)
  set_fact:
    key_response2: >-
      {% set body = curl_response2.stdout[:-3] | trim %}
      {% if body %}{{ body | from_json }}{% else %}[] {% endif %}
  when: curl_response2.stdout[-3:] == "200"

- name: Debug Key Response 2 
  debug:
    msg: "{{ key_response2 }}"

- name: Debug target file path
  debug:
    msg: "Writing keys to: {{ netmaker_enrollment_key_list_file_location }}"

- name: Ensure proper JSON content is written (valid JSON format)
  copy:
    content: "{{ key_response2 | to_json | regex_replace(\"'\", '\"') | regex_replace('True', 'true') | regex_replace('False', 'false')| regex_replace('^\"', '') | regex_replace('\"$', '') }}"
    dest: "{{ netmaker_enrollment_key_list_file_location }}"
  delegate_to: localhost


