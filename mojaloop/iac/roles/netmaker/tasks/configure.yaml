- name: Wait for Netmaker API server to respond using curl
  command: >
    curl -s -w "%{http_code} - Netmaker API is up" -H "Authorization: Bearer {{ netmaker_master_key }}"
    https://api.{{ netmaker_base_domain }}/api/networks
  register: _result
  until: _result.stdout is defined and (_result.stdout | regex_search('200') or _result.stdout | regex_search('up'))
  retries: 3
  delay: 10
- debug:
    msg: "Request: curl -s -w '%{http_code} - Netmaker API is up' -H 'Authorization: Bearer {{ netmaker_master_key }}' https://api.{{ netmaker_base_domain }}/api/networks.  Response: {{ _result.stdout }}"

