- name: Get all existing networks
  command: >
    curl -X GET
    -H 'Content-Type: application/json'
    -H 'Authorization: Bearer {{ netmaker_master_key }}'
    "https://api.{{ netmaker_base_domain }}/api/networks"
  register: existing_netmaker_networks
  retries: 3  # Add retries
  delay: 5    # Add a delay between retries
  until: existing_netmaker_networks.rc == 0
- debug:
    msg: "curl -X GET -H 'Content-Type: application/json' -H 'Authorization: Bearer {{ netmaker_master_key }}' 'https://api.{{ netmaker_base_domain }}/api/networks' Response: {{ existing_netmaker_networks.stdout }}"

- debug:
    var: existing_netmaker_networks

- name: Check if the request was successful
  fail:
    msg: "Failed to retrieve networks from Netmaker API.  Check the API availability, credentials, and domain."
  when: existing_netmaker_networks.rc != 0


- name: Compose the new network list
  set_fact:
    new_netmaker_networks: "{{ ( new_netmaker_networks | list ) + ( [{\"network_name\": item.network_name, \"node_keys\": item.node_keys, \"network_cidr\": item.network_cidr }] | list ) }}"
  when: ( existing_netmaker_networks.stdout | from_json ) | selectattr('netid', 'equalto', item.network_name) | list | count == 0
  with_items: "{{ netmaker_networks }}"

- name: Create new networks in netmaker
  command: >
    curl -X POST
    -H 'Content-Type: application/json'
    -H 'Authorization: Bearer {{ netmaker_master_key }}'
    -d "{{ lookup('template', 'createnetwork.json.j2') }}"
    "https://api.{{ netmaker_base_domain }}/api/networks"
  register: create_network_output
  until: create_network_output.rc == 0
  loop: "{{ new_netmaker_networks }}"
  with_items: "{{ new_netmaker_networks }}"

- name: Get keys
  command: >
    curl -X GET
    -H 'Content-Type: application/json'
    -H 'Authorization: Bearer {{ netmaker_master_key }}'
    "https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys"
  register: key_response
  until: key_response.rc == 0
- debug:
    msg: "curl -X GET -H 'Content-Type: application/json' -H 'Authorization: Bearer {{ netmaker_master_key }}' 'https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys'"

- name: Add key for control network for netclient
  command: >
    curl -X POST
    -H 'Content-Type: application/json'
    -H 'Authorization: Bearer {{ netmaker_master_key }}'
    -d "{{ lookup('template', 'createkey.json.j2') }}"
    "https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys"
  register: add_key_response
  until: "add_key_response.rc == 0 or ('400' in add_key_response.stdout and 'already exists' in add_key_response.stdout)"
  vars:
    keytag: "{{ item.0.network_name }}-{{ item.1 }}"
  when: "( key_response.stdout | from_json ) | selectattr('tags', 'equalto', [keytag]) | list | count == 0"
  loop: "{{ new_netmaker_networks | subelements('node_keys') }}"
- debug:
    msg: "curl -X POST -H 'Content-Type: application/json' -H 'Authorization: Bearer {{ netmaker_master_key }}' -d '{{ lookup('template', 'createkey.json.j2') }}' 'https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys'"

- name: Create directory for enrollment key list file
  ansible.builtin.file:
    path: "{{ netmaker_enrollment_key_list_file_location | dirname }}"
    state: directory
    mode: '0755'  # Ensure the directory has appropriate permissions

- name: Get keys again and save to file
  command: >
    curl -X GET
    -H 'Content-Type: application/json'
    -H 'Authorization: Bearer {{ netmaker_master_key }}'
    "https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys"
    -o "{{ netmaker_enrollment_key_list_file_location }}"
  register: key_response2
  until: key_response2.rc == 0
- debug:
    msg: "curl -X GET -H 'Content-Type: application/json' -H 'Authorization: Bearer {{ netmaker_master_key }}' 'https://api.{{ netmaker_base_domain }}/api/v1/enrollment-keys' -o '{{ netmaker_enrollment_key_list_file_location }}'"

- name: Echo the content
  ansible.builtin.debug:
    msg: "API Response: {{ key_response2.stdout }}"

- name: Write content to file (handle empty response)
  ansible.builtin.copy:
    dest: "{{ netmaker_enrollment_key_list_file_location }}"
    content: "{{ key_response2.stdout | default('[]') }}"
  when:
    - key_response2.rc == 0
    - key_response2.stdout is defined
    - key_response2.stdout | length > 0
    - key_response2.stdout | from_json is defined
    - key_response2.stdout | from_json | length > 0
- name: Write empty array to file
  ansible.builtin.copy:
    dest: "{{ netmaker_enrollment_key_list_file_location }}"
    content: "[]"
  when:
    - key_response2.rc == 0
    - key_response2.stdout is defined
    - key_response2.stdout | length == 0 or key_response2.stdout == "[]"
